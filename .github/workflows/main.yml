name: Deploy Etiquettix

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer les fichiers
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dependances
        run: npm install

      - name: Construire application
        run: npm run build -- --base=/Etiquettix/

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparer le site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Mettre le site en ligne
        id: deployment
        uses: actions/deploy-pages@v4
